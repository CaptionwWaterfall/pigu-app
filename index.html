<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>辟谷修行</title>
    <!-- PWA 配置 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="辟谷">
    <link rel="apple-touch-icon" href="icon.svg">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        daoBlack: '#1a1a1a',
                        daoWhite: '#f5f5f5',
                        daoGray: '#808080',
                    },
                    fontFamily: {
                        serif: ['"Noto Serif SC"', 'serif'],
                    }
                }
            }
        }
    </script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-daoWhite text-daoBlack font-serif min-h-screen flex flex-col items-center p-4">
    
    <!-- Login Screen -->
    <div id="login-screen" class="flex flex-col items-center justify-center min-h-[80vh] w-full max-w-md hidden">
        <div class="taichi-logo mb-8 w-32 h-32"></div>
        <h1 class="text-4xl font-bold mb-8 tracking-widest">辟谷修行</h1>
        <input type="text" id="username-input" placeholder="输入道号 (用户名)" class="w-full px-4 py-3 bg-transparent border-b-2 border-daoBlack focus:outline-none focus:border-daoGray text-center text-xl mb-6">
        <button id="login-btn" class="px-8 py-3 bg-daoBlack text-daoWhite rounded-full text-xl hover:bg-gray-800 transition shadow-lg">入道</button>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="w-full max-w-md flex flex-col items-center hidden pb-20">
        <header class="w-full flex justify-between items-center py-4 border-b border-gray-300 mb-6">
            <h2 class="text-2xl font-bold">道友 <span id="display-username"></span></h2>
            <div class="flex gap-4 items-center">
                <button id="data-manage-btn" class="text-sm text-daoBlack hover:text-gray-600 underline" title="数据备份与恢复">数据管理</button>
                <button id="logout-btn" class="text-sm text-daoGray hover:text-daoBlack underline">退出</button>
            </div>
        </header>

        <!-- Fasting Timer Section -->
        <section class="w-full bg-white rounded-3xl shadow-xl p-8 mb-8 flex flex-col items-center relative overflow-hidden border border-gray-100">
            <div class="absolute top-0 right-0 w-32 h-32 bg-gray-50 rounded-bl-full -z-10 opacity-50"></div>
            <h3 class="text-xl mb-4 tracking-wider text-gray-500">辟谷时辰</h3>
            
            <div class="timer-display my-6 relative flex justify-center items-center w-48 h-48 rounded-full border-4 border-daoBlack shadow-inner bg-daoWhite">
                <div class="text-center z-10">
                    <div id="timer-text" class="text-4xl font-bold tracking-widest">00:00:00</div>
                    <div id="timer-days" class="text-sm mt-2 text-gray-500">0 天</div>
                </div>
            </div>

            <div class="flex gap-4 w-full mt-4">
                <button id="start-fast-btn" class="flex-1 py-3 bg-daoBlack text-daoWhite rounded-full text-lg hover:bg-gray-800 transition">开始辟谷</button>
                <button id="stop-fast-btn" class="flex-1 py-3 bg-white text-daoBlack border-2 border-daoBlack rounded-full text-lg hover:bg-gray-100 transition hidden">结束辟谷</button>
            </div>
            
            <p id="fasting-status" class="mt-4 text-sm text-gray-500 hidden">已开始修行...</p>
        </section>

        <!-- Weight Tracking Section -->
        <section class="w-full bg-white rounded-3xl shadow-xl p-6 flex flex-col border border-gray-100">
            <h3 class="text-xl mb-4 tracking-wider text-gray-500 border-b pb-2">体重记录</h3>
            
            <div class="flex items-center gap-4 mb-6 mt-2">
                <input type="number" id="weight-input" step="0.1" placeholder="体重 (kg)" class="flex-1 px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:border-daoBlack">
                <button id="record-weight-btn" class="px-6 py-2 bg-daoBlack text-daoWhite rounded-lg hover:bg-gray-800 transition">记录</button>
            </div>

            <div class="w-full aspect-video">
                <canvas id="weight-chart"></canvas>
            </div>
        </section>
    </div>

    <!-- Data Management Modal -->
    <div id="data-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">数据管理</h3>
            <p class="text-sm text-gray-500 mb-6">本地数据存在丢失风险（如清理浏览器缓存或重装系统）。建议定期导出备份。</p>
            
            <div class="flex flex-col gap-4">
                <button id="export-btn" class="w-full py-3 bg-daoBlack text-daoWhite rounded-lg hover:bg-gray-800 transition">
                    导出数据备份
                </button>
                
                <div class="relative">
                    <input type="file" id="import-input" accept=".json" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <button class="w-full py-3 bg-white text-daoBlack border border-daoBlack rounded-lg hover:bg-gray-50 transition pointer-events-none">
                        导入数据备份
                    </button>
                </div>
                
                <button id="close-modal-btn" class="mt-2 text-sm text-daoGray hover:text-daoBlack underline">关闭</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
